<svg viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1400" height="320" fill="#0b1e2d"/>

  <!-- connecting line -->
  <line x1="90" y1="160" x2="1310" y2="160" stroke="#1f9e8f" stroke-width="3"/>

  <!-- Stage template: box, number, title, subtitle -->
  <!-- Stage 1 -->
  <g>
    <rect x="20" y="60" width="160" height="200" rx="10" fill="#12293c"/>
    <circle cx="100" cy="105" r="24" fill="#1f9e8f"/>
    <text x="100" y="113" text-anchor="middle" fill="#0b1e2d" font-size="22" font-weight="bold">1</text>
    <text x="100" y="160" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Data</text>
    <text x="100" y="180" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Collection</text>
    <text x="100" y="210" text-anchor="middle" fill="#9fb3c0" font-size="11">Load raw</text>
    <text x="100" y="225" text-anchor="middle" fill="#9fb3c0" font-size="11">ingredient text</text>
  </g>

  <!-- Stage 2 -->
  <g>
    <rect x="205" y="60" width="160" height="200" rx="10" fill="#12293c"/>
    <circle cx="285" cy="105" r="24" fill="#1f9e8f"/>
    <text x="285" y="113" text-anchor="middle" fill="#0b1e2d" font-size="22" font-weight="bold">2</text>
    <text x="285" y="160" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Text</text>
    <text x="285" y="180" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Cleaning</text>
    <text x="285" y="210" text-anchor="middle" fill="#9fb3c0" font-size="11">Regex normalize</text>
    <text x="285" y="225" text-anchor="middle" fill="#9fb3c0" font-size="11">%, &amp;, +, brackets</text>
  </g>

  <!-- Stage 3 -->
  <g>
    <rect x="390" y="60" width="160" height="200" rx="10" fill="#12293c"/>
    <circle cx="470" cy="105" r="24" fill="#1f9e8f"/>
    <text x="470" y="113" text-anchor="middle" fill="#0b1e2d" font-size="22" font-weight="bold">3</text>
    <text x="470" y="170" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Tokenization</text>
    <text x="470" y="210" text-anchor="middle" fill="#9fb3c0" font-size="11">word_tokenize()</text>
    <text x="470" y="225" text-anchor="middle" fill="#9fb3c0" font-size="11">rejoin split symbols</text>
  </g>

  <!-- Stage 4 -->
  <g>
    <rect x="575" y="60" width="160" height="200" rx="10" fill="#12293c"/>
    <circle cx="655" cy="105" r="24" fill="#1f9e8f"/>
    <text x="655" y="113" text-anchor="middle" fill="#0b1e2d" font-size="22" font-weight="bold">4</text>
    <text x="655" y="160" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Stopword</text>
    <text x="655" y="180" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Removal</text>
    <text x="655" y="210" text-anchor="middle" fill="#9fb3c0" font-size="11">NLTK stopwords</text>
    <text x="655" y="225" text-anchor="middle" fill="#9fb3c0" font-size="11">keep to / and / can</text>
  </g>

  <!-- Stage 5 -->
  <g>
    <rect x="760" y="60" width="160" height="200" rx="10" fill="#12293c"/>
    <circle cx="840" cy="105" r="24" fill="#1f9e8f"/>
    <text x="840" y="113" text-anchor="middle" fill="#0b1e2d" font-size="22" font-weight="bold">5</text>
    <text x="840" y="170" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Lemmatization</text>
    <text x="840" y="210" text-anchor="middle" fill="#9fb3c0" font-size="11">WordNetLemmatizer</text>
    <text x="840" y="225" text-anchor="middle" fill="#9fb3c0" font-size="11">leaves to leaf</text>
  </g>

  <!-- Stage 6 -->
  <g>
    <rect x="945" y="60" width="160" height="200" rx="10" fill="#12293c"/>
    <circle cx="1025" cy="105" r="24" fill="#1f9e8f"/>
    <text x="1025" y="113" text-anchor="middle" fill="#0b1e2d" font-size="22" font-weight="bold">6</text>
    <text x="1025" y="160" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Unit</text>
    <text x="1025" y="180" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Extraction</text>
    <text x="1025" y="210" text-anchor="middle" fill="#9fb3c0" font-size="11">~150 unit variants</text>
    <text x="1025" y="225" text-anchor="middle" fill="#9fb3c0" font-size="11">dictionary match</text>
  </g>

  <!-- Stage 7 -->
  <g>
    <rect x="1130" y="60" width="160" height="200" rx="10" fill="#12293c"/>
    <circle cx="1210" cy="105" r="24" fill="#1f9e8f"/>
    <text x="1210" y="113" text-anchor="middle" fill="#0b1e2d" font-size="22" font-weight="bold">7</text>
    <text x="1210" y="160" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Structured</text>
    <text x="1210" y="180" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Output</text>
    <text x="1210" y="210" text-anchor="middle" fill="#9fb3c0" font-size="11">Qty | Unit | Food</text>
    <text x="1210" y="225" text-anchor="middle" fill="#9fb3c0" font-size="11">exported to CSV</text>
  </g>
</svg>
